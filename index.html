<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETLOVER24 WinGo</title>
    <style>
        /* 🎨 ওরিজিনাল কালার ও থিম রুট */
        :root { --primary: #ffa4d4d; --green: #28a745; --violet: #9c27b0; --red: #dc3545; --dark: #333; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 5px; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 360px; background: white; border: 2px solid var(--dark); border-radius: 12px; padding: 10px; box-sizing: border-box; }
        
        /* 🎫 BETLOVER24 BALANCE MENU */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #fff; border: 2px solid var(--dark); border-radius: 8px; margin-bottom: 15px; }
        .logo-text { font-weight: bold; font-size: 14px; color: var(--dark); }
        .balance-box { border: 2px solid var(--dark); padding: 4px 12px; font-weight: bold; border-radius: 5px; font-size: 13px; background: #fff; }
        .menu-icon { font-size: 22px; cursor: pointer; font-weight: bold; }
        
        /* ⏳ টাইম ট্যাব - অনলাইন মোড */
        .tabs { display: flex; background: #ff4d4d; border-bottom: 2px solid var(--dark); border-radius: 8px 8px 0 0; overflow: hidden; margin-bottom: 2px; }
        .tab { flex: 1; padding: 10px 2px; text-align: center; font-size: 11px; cursor: pointer; font-weight: bold; color: #333; background: #fff; border-right: 1px solid #ddd; }
        .tab.active { background: var(--primary); color: white !important; }
        
        /* ⏰ টাইমার কার্ড */
        .timer-card { background: var(--primary); margin: 0; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--dark); border-top: none; border-radius: 0 0 8px 8px; margin-bottom: 15px; }
        .timer-val { font-size: 28px; font-weight: bold; letter-spacing: 2px; font-family: monospace; }
        
        /* 🟢 কালার বাটন 🔴 */
        .color-btns { display: flex; gap: 8px; padding: 15px 5px; margin-bottom: 5px; }
        .c-btn { flex: 1; padding: 12px 2px; border: 2px solid var(--dark); border-radius: 8px; color: white; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; box-shadow: 0 4px var(--dark); transition: 0.1s; }
        .c-btn:active { transform: translateY(3px); box-shadow: 0 1px var(--dark); }
        .bg-green { background: var(--green); } .bg-violet { background: var(--violet); } .bg-red { background: var(--red); }
        
        /* 🔢 নম্বর গ্রিড (০ থেকে ৯ সংখ্যা নেভি) */
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 5px; margin-bottom: 15px; }
        .n-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; cursor: pointer; border: 2px solid var(--dark); box-shadow: 0 4px var(--dark); transition: 0.1s; margin: auto; }
        .n-circle:active { transform: translateY(3px); box-shadow: 0 1px var(--dark); }
        
        /* 💠 রেড + ভায়োলেট মিক্সড থিম (০ এবং ৫ কালারস) */
        .n-0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); }
        .n-5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); }
        .n-1, .n-3, .n-7, .n-9 { background: var(--green); }
        .n-2, .n-4, .n-6, .n-8 { background: var(--red); }
        
        /* 🎚️ মাল্টিপ্লায়ার চিপস */
        .multi-row { display: flex; gap: 4px; padding: 0 5px; margin-bottom: 15px; }
        .m-chip { flex: 1; padding: 6px 0; text-align: center; font-size: 11px; font-weight: bold; border: 2px solid var(--dark); border-radius: 4px; background: #fff; cursor: pointer; box-shadow: 0 2px var(--dark); }
        .m-chip.active { background: var(--green); color: white; border-color: var(--dark); }
        
        /* 🔸 Big Small 🔹 */
        .bs-row { display: flex; padding: 0 5px; gap: 10px; margin-bottom: 20px; }
        .bs-btn { flex: 1; padding: 12px 2px; border: 2px solid var(--dark); color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; border-radius: 8px; box-shadow: 0 4px var(--dark); transition: 0.1s; }
        .bs-btn:active { transform: translateY(3px); box-shadow: 0 1px var(--dark); }
        .b-big { background: #ffa000; } .b-small { background: #40c4ff; }
        
        /* 🔳 পপআপ সিডিউল উইন্ডো */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        .modal { display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 360px; background: white; border-radius: 16px 16px 0 0; padding: 15px; box-sizing: border-box; z-index: 1000; animation: slideUp 0.2s ease-out; border: 2px solid var(--dark); border-bottom: none; }
        @keyframes slideUp { from { bottom: -100%; } to { bottom: 0; } }
        
        .m-header { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); color: white; font-weight: bold; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 2px solid var(--dark); }
        .sel-tag { background: white; color: #333; padding: 2px 15px; border-radius: 5px; font-size: 13px; margin-left: 5px; border: 1px solid #333; font-weight: bold; }
        .chip-row { display: flex; gap: 6px; margin-bottom: 15px; }
        .chip { flex: 1; padding: 10px 0; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-weight: bold; font-size: 12px; cursor: pointer; background: #fdfdfd; box-shadow: 0 2px #ccc; }
        .chip.active { background: var(--green); color: white; border-color: var(--dark); box-shadow: 0 2px var(--dark); }
        
        .qty-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
        .qty-btn { width: 35px; height: 35px; background: #fff; border: 2px solid var(--dark); border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 2px var(--dark); }
        .confirm-btn { width: 100%; padding: 12px; background: var(--green); color: white; font-weight: bold; font-size: 16px; border: 2px solid var(--dark); border-radius: 8px; cursor: pointer; box-shadow: 0 4px var(--dark); }
        
        /* 📊 টেবিল লগ */
        table { width: 100%; margin: auto; border-collapse: collapse; border: 2px solid var(--dark); font-size: 11px; background: #fff; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        th { background: var(--dark); color: white; padding: 8px; font-weight: bold; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-text">BETLOVER24</div>
        <div class="balance-box" id="user-balance">Balance</div>
        <div class="menu-icon">☰</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchMode(30, this)">WinGo 30s</div>
        <div class="tab" onclick="switchMode(60, this)">1 Min</div>
        <div class="tab" onclick="switchMode(180, this)">3 Min</div>
        <div class="tab" onclick="switchMode(300, this)">5 Min</div>
    </div>

    <div class="timer-card">
        <div>
            <div style="font-size:11px; opacity:0.8; font-weight:bold; margin-bottom:2px;">Period Number</div>
            <div style="font-size:15px; font-weight:bold; letter-spacing:0.5px;" id="p-num">---------</div>
        </div>
        <div>
            <div style="font-size:11px; opacity:0.8; font-weight:bold; text-align:right; margin-bottom:2px;">Time remaining</div>
            <div class="timer-val" id="timer">00:30</div>
        </div>
    </div>

    <div class="color-btns">
        <div class="c-btn bg-green" onclick="openPop('Green')">Green</div>
        <div class="c-btn bg-violet" onclick="openPop('Violet')">Violet</div>
        <div class="c-btn bg-red" onclick="openPop('Red')">Red</div>
    </div>

    <div class="number-grid">
        <div class="n-circle n-0" onclick="openPop('0')">0</div>
        <div class="n-circle n-1" onclick="openPop('1')">1</div>
        <div class="n-circle n-2" onclick="openPop('2')">2</div>
        <div class="n-circle n-3" onclick="openPop('3')">3</div>
        <div class="n-circle n-4" onclick="openPop('4')">4</div>
        <div class="n-circle n-5" onclick="openPop('5')">5</div>
        <div class="n-circle n-6" onclick="openPop('6')">6</div>
        <div class="n-circle n-7" onclick="openPop('7')">7</div>
        <div class="n-circle n-8" onclick="openPop('8')">8</div>
        <div class="n-circle n-9" onclick="openPop('9')">9</div>
    </div>

    <div class="multi-row">
        <div class="m-chip active" onclick="setBase(1, this)">X1</div>
        <div class="m-chip" onclick="setBase(5, this)">X5</div>
        <div class="m-chip" onclick="setBase(10, this)">X10</div>
        <div class="m-chip" onclick="setBase(100, this)">X100</div>
    </div>

    <div class="bs-row">
        <div class="bs-btn b-big" onclick="openPop('Big')">Big</div>
        <div class="bs-btn b-small" onclick="openPop('Small')">Small</div>
    </div>

    <table>
        <thead>
            <tr><th>Period</th><th>Number</th><th>Big Small</th><th>Color</th></tr>
        </thead>
        <tbody id="history"></tbody>
    </table>
</div>

<!-- মডাল উইন্ডো পপআপ ট্যাগস -->
<div class="overlay" id="over" onclick="closePop()"></div>
<div class="modal" id="nodal">
    <div class="m-header">WinGo <span id="m-mode-txt">30s</span><span class="sel-tag" id="sel">-</span></div>
    <div class="chip-row">
        <div class="chip active" onclick="setBase(10, this)">10</div>
